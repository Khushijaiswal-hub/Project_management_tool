<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">⬡</div>
      <h1>TaskFlow</h1>
      <p>Collaborative project management</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showTab('login')">Login</button>
      <button class="tab-btn" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn-primary full-width" onclick="login()">Sign In</button>
      <p id="login-error" class="error-msg"></p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="auth-form hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" />
      </div>
      <button class="btn-primary full-width" onclick="register()">Create Account</button>
      <p id="reg-error" class="error-msg"></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
